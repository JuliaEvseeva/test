name: Create Pull Request

on:
  push:
    branches:
      - stage

jobs:
  create-pull-requst:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: List associated Pull Requests
        id: associated-pull-requests
        uses: int128/list-associated-pull-requests-action@v1
        with:
          base: master
          head: stage

      - name: Update PR Description
        uses: nefrob/pr-description@v1.1.1
        with:
          content: "<!-- start regex match -->New content!<!-- end regex match -->"
          regex: "<!-- start regex match -->.*?<!-- end regex match -->"
          regexFlags: ims
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Pull Request
        id: create-pull-request
        uses: devops-infra/action-pull-request@v0.5.5
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          source_branch: stage
          target_branch: master
          title: "Release updates from `stage` into `master`"
          body: ${{ steps.associated-pull-requests.outputs.body }}
          label: release
          get_diff: true
          draft: true
